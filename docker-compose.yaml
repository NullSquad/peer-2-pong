version: "3.8"

services:
  database:
    restart: always
    image: mongo:8
    volumes:
      - data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASS}
    networks:
      - api-db

  backend:
    restart: always
    build:
      context: ./backend
    environment:
      PORT: ${BACKEND_PORT}
      DB_URI: mongodb://${DB_USER}:${DB_PASS}@database:27017
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
      CALLBACK_URL: ${CALLBACK_URL}
    depends_on:
      - database
    networks:
      - api-db
      - client-api
    volumes:
      - ./backend/src:/app/src  # Sincroniza el código fuente para desarrollo.
      - ./backend/package.json:/app/package.json

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      PORT: ${FRONTEND_PORT}
      API_URI: http://backend:${BACKEND_PORT}
    depends_on:
      - backend
    networks:
      - client-api
    volumes:
      - ./frontend/src:/app/src  # Sincroniza el código fuente para desarrollo.
      - ./frontend/package.json:/app/package.json

volumes:
  data:
    driver: local

networks:
  api-db:
    driver: bridge
  client-api:
    driver: bridge
